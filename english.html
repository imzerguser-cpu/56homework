<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맛있는 영어 - Yummy English Quiz (5,6학년)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Jua&family=Nunito:wght@500;700;800&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --coral:#FF6B4A;
    --coral-dark:#E5532F;
    --mustard:#FFC93C;
    --mustard-dark:#E8AE12;
    --green:#3FA772;
    --green-dark:#2C7F55;
    --cream:#FFF7EC;
    --cream-2:#FFEFDA;
    --ink:#3A2B22;
    --ink-soft:#7A6A5D;
    --white:#FFFFFF;
    --red-soft:#FF7A70;
    --shadow: 0 8px 24px rgba(58,43,34,0.12);
    --shadow-sm: 0 4px 10px rgba(58,43,34,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 8% 12%, rgba(255,201,60,0.28) 0, transparent 42%),
      radial-gradient(circle at 92% 88%, rgba(63,167,114,0.20) 0, transparent 40%),
      var(--cream);
    font-family:'Nunito','Noto Sans KR',sans-serif;
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:22px 18px 60px;
    min-height:100vh;
  }
  h1,h2,h3{margin:0;}
  .brandbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
    gap:8px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Jua',sans-serif;
    font-size:22px;
    color:var(--coral-dark);
  }
  .brand .plate{
    width:34px;height:34px;border-radius:50%;
    background:var(--white);
    border:3px solid var(--coral);
    display:flex;align-items:center;justify-content:center;
    font-size:16px;
    flex:none;
  }
  .navbtns{display:flex;gap:6px;}
  .homebtn{
    background:var(--white);
    border:none;
    border-radius:14px;
    padding:8px 12px;
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:12.5px;
    color:var(--ink-soft);
    box-shadow:var(--shadow-sm);
    cursor:pointer;
    display:none;
    white-space:nowrap;
  }
  .homebtn.show{display:inline-block;}

  /* ---------- Hero / list screens ---------- */
  .hero{
    background:linear-gradient(135deg, var(--coral) 0%, #FF8A63 100%);
    border-radius:28px;
    padding:26px 24px;
    color:var(--white);
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
    margin-bottom:20px;
  }
  .hero::after{
    content:"🍕 🎨 🐯 ☂️ 🎂";
    position:absolute;
    right:-10px; bottom:-14px;
    font-size:30px;
    opacity:0.26;
    letter-spacing:6px;
  }
  .hero h1{
    font-family:'Jua',sans-serif;
    font-size:24px;
    line-height:1.4;
    margin-bottom:6px;
  }
  .hero p{
    margin:0;
    font-size:14px;
    opacity:0.92;
    line-height:1.6;
    max-width:82%;
  }
  .listcards{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .listcard{
    background:var(--white);
    border-radius:20px;
    padding:16px 16px;
    box-shadow:var(--shadow-sm);
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
    border:2px solid transparent;
    transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    text-align:left;
  }
  .listcard:hover{transform:translateY(-2px); border-color:var(--mustard); box-shadow:var(--shadow);}
  .listcard:active{transform:translateY(0px) scale(0.99);}
  .listcard .num{
    flex:none;
    width:46px;height:46px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Jua',sans-serif;
    font-size:18px;
    color:var(--white);
  }
  .listcard .body{flex:1; min-width:0;}
  .listcard .body h3{
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:15px;
    color:var(--ink);
    margin-bottom:3px;
    display:flex;
    flex-wrap:wrap;
    align-items:baseline;
    gap:6px;
  }
  .listcard .body h3 .titleEn{
    font-family:'Fredoka',sans-serif;
    font-weight:500;
    font-size:12px;
    color:var(--ink-soft);
  }
  .listcard .body p{
    margin:0;
    font-size:12px;
    color:var(--ink-soft);
    line-height:1.5;
  }
  .listcard .tag{
    flex:none;
    font-size:10.5px;
    font-weight:800;
    padding:5px 9px;
    border-radius:20px;
    color:var(--white);
    white-space:nowrap;
  }
  .unitchip{
    display:inline-block;
    background:var(--cream-2);
    color:var(--coral-dark);
    font-weight:800;
    font-size:11px;
    padding:4px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }

  /* ---------- Game screen ---------- */
  .gamehead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
    gap:10px;
  }
  .gamehead .titlewrap{display:flex;flex-direction:column;gap:2px; min-width:0;}
  .gamehead h2{
    font-family:'Jua',sans-serif;
    font-size:17px;
    color:var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .gameTitleEn{
    font-family:'Fredoka',sans-serif;
    font-weight:500;
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:1px;
  }
  .progresswrap{
    display:flex;align-items:center;gap:8px;
    font-size:12px;font-weight:800;color:var(--ink-soft);
    margin-top:4px;
  }
  .progressbar{
    width:90px;height:8px;border-radius:6px;background:var(--cream-2);overflow:hidden;
  }
  .progressbar .fill{height:100%;background:var(--green);border-radius:6px;transition:width .3s ease;}
  .score{
    background:var(--white);
    border-radius:14px;
    padding:7px 12px;
    font-weight:800;
    font-size:13px;
    box-shadow:var(--shadow-sm);
    color:var(--coral-dark);
    white-space:nowrap;
    flex:none;
  }

  .stage{
    background:var(--white);
    border-radius:26px;
    padding:26px 22px 22px;
    box-shadow:var(--shadow);
    min-height:340px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    gap:16px;
    position:relative;
  }
  .plateframe{
    width:180px;height:180px;
    border-radius:50%;
    background:var(--cream);
    border:8px solid var(--white);
    box-shadow: 0 0 0 3px var(--cream-2), var(--shadow-sm);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    margin-top:4px;
  }
  .plateframe img{width:100%;height:100%;object-fit:cover;}
  .prompttext{
    text-align:center;
  }
  .prompttext .kotag{
    display:inline-block;
    background:var(--cream-2);
    color:var(--coral-dark);
    font-weight:800;
    font-size:11px;
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:8px;
    font-family:'Nunito',sans-serif;
  }
  .prompttext .main{
    font-family:'Jua',sans-serif;
    font-size:23px;
    color:var(--ink);
    line-height:1.5;
  }
  .prompttext .sub{
    margin-top:6px;
    font-size:14px;
    color:var(--ink-soft);
    font-weight:600;
    line-height:1.6;
  }
  .word-en{
    font-family:'Fredoka',sans-serif;
    font-size:25px;
    font-weight:600;
    color:var(--coral-dark);
    text-align:center;
  }
  .sentence-en{
    font-size:15px;
    color:var(--ink-soft);
    text-align:center;
    font-weight:700;
    line-height:1.6;
    max-width:420px;
  }

  .controls{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    margin-top:auto;
    padding-top:6px;
  }
  .microw{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .micbtn{
    width:70px;height:70px;
    border-radius:50%;
    border:none;
    background:linear-gradient(135deg, var(--coral), var(--red-soft));
    color:var(--white);
    font-size:27px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(255,107,74,0.45);
    transition:transform .12s ease;
  }
  .micbtn:active{transform:scale(0.94);}
  .micbtn.listening{
    animation:pulse 1.1s infinite;
    background:linear-gradient(135deg, var(--green), #59C48A);
    box-shadow:0 6px 16px rgba(63,167,114,0.5);
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(63,167,114,0.55);}
    70%{box-shadow:0 0 0 18px rgba(63,167,114,0);}
    100%{box-shadow:0 0 0 0 rgba(63,167,114,0);}
  }
  .sidebtn{
    width:42px;height:42px;
    border-radius:50%;
    border:none;
    background:var(--cream-2);
    color:var(--ink-soft);
    font-size:16px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .sidebtn:hover{background:var(--mustard);color:var(--ink);}
  .miclabel{
    font-size:12px;
    font-weight:800;
    color:var(--ink-soft);
    min-height:16px;
    text-align:center;
  }
  .transcript{
    min-height:20px;
    font-size:14px;
    color:var(--ink);
    font-weight:700;
    text-align:center;
  }
  .feedback{
    width:100%;
    border-radius:16px;
    padding:12px 16px;
    font-weight:800;
    font-size:14px;
    text-align:center;
    display:none;
  }
  .feedback.correct{
    display:block;
    background:#E7F7EE;
    color:var(--green-dark);
  }
  .feedback.wrong{
    display:block;
    background:#FFEDEA;
    color:var(--coral-dark);
  }
  .feedback .answer-reveal{
    display:block;
    margin-top:4px;
    font-size:12.5px;
    font-weight:700;
    color:var(--ink-soft);
  }
  .actionrow{
    display:flex;
    gap:10px;
    width:100%;
  }
  .btn{
    flex:1;
    border:none;
    border-radius:14px;
    padding:12px 10px;
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:13.5px;
    cursor:pointer;
    transition:transform .12s ease, opacity .12s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn.primary{background:var(--coral);color:var(--white);}
  .btn.ghost{background:var(--cream-2);color:var(--ink-soft);}
  .btn.next{background:var(--green);color:var(--white);}
  .btn[disabled]{opacity:0.45;cursor:not-allowed;}
  .hidden{display:none !important;}

  .textfallback{
    width:100%;
    display:flex;
    gap:8px;
  }
  .textfallback input{
    flex:1;
    border:2px solid var(--cream-2);
    border-radius:12px;
    padding:10px 12px;
    font-size:14px;
    font-family:'Nunito',sans-serif;
    outline:none;
  }
  .textfallback input:focus{border-color:var(--mustard);}
  .textfallback button{
    border:none;background:var(--coral);color:var(--white);
    border-radius:12px;padding:0 16px;font-weight:800;cursor:pointer;
  }
  .toggletext{
    font-size:12px;
    color:var(--ink-soft);
    text-decoration:underline;
    cursor:pointer;
    background:none;border:none;
    font-family:'Nunito',sans-serif;
    font-weight:700;
  }
  .notice{
    font-size:11.5px;
    color:var(--ink-soft);
    background:var(--cream-2);
    border-radius:10px;
    padding:8px 10px;
    text-align:center;
    line-height:1.5;
  }

  /* ---------- Result screen ---------- */
  .resultbox{
    background:var(--white);
    border-radius:26px;
    padding:32px 22px;
    box-shadow:var(--shadow);
    text-align:center;
  }
  .resultbox .emoji{font-size:50px;margin-bottom:8px;}
  .resultbox h2{
    font-family:'Jua',sans-serif;
    font-size:22px;
    margin-bottom:6px;
  }
  .resultbox .scoreline{
    font-family:'Fredoka',sans-serif;
    font-size:34px;
    font-weight:700;
    color:var(--coral-dark);
    margin:12px 0 4px;
  }
  .resultbox .scoresub{
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:20px;
  }
  .resultactions{display:flex; flex-direction:column; gap:8px;}

  .float-badge{
    position:fixed;
    pointer-events:none;
    font-size:26px;
    animation:floatUp 1s ease-out forwards;
    z-index:50;
  }
  @keyframes floatUp{
    0%{opacity:0; transform:translateY(0) scale(0.6);}
    20%{opacity:1; transform:translateY(-10px) scale(1.1);}
    100%{opacity:0; transform:translateY(-70px) scale(1);}
  }

  @media (max-width:420px){
    .plateframe{width:150px;height:150px;}
    .hero h1{font-size:21px;}
    .hero p{max-width:100%;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brandbar">
    <div class="brand"><span class="plate">🍽️</span> 맛있는 영어 퀴즈</div>
    <div class="navbtns">
      <button class="homebtn" id="gradeBtn">🎓 학년</button>
      <button class="homebtn" id="homeBtn">📚 단원</button>
      <button class="homebtn" id="unitMenuBtn">🔁 게임</button>
    </div>
  </div>

  <!-- SCREEN 0: GRADE SELECT -->
  <div id="screen-grade">
    <div class="notice hidden" id="fileProtocolWarning" style="margin-bottom:14px; text-align:left;"></div>
    <div class="hero">
      <h1>초등 영어 말하기 연습<br>학년을 선택하세요</h1>
      <p>학년별 단원을 골라서 그림, 단어, 표현을 마이크로 말하며 공부해요.</p>
    </div>
    <div class="listcards" id="gradeList"></div>
  </div>

  <!-- SCREEN 1: UNIT LIST -->
  <div id="screen-home" class="hidden">
    <div class="hero">
      <h1 id="homeHeroTitle">초등 영어<br>전 단원 말하기 연습</h1>
      <p>단원을 골라서 그림, 단어, 표현을 마이크로 말하며 공부해요.</p>
    </div>
    <div class="listcards" id="unitList"></div>
  </div>

  <!-- SCREEN 2: UNIT MENU (5 games for a chosen unit) -->
  <div id="screen-unitmenu" class="hidden">
    <div class="hero" style="padding:20px 22px;">
      <span class="unitchip" id="unitChip">Lesson 1</span>
      <h1 id="unitHeroTitle" style="font-size:20px;">Hello! I'm Dito</h1>
    </div>
    <div class="listcards" id="modeList"></div>
  </div>

  <!-- SCREEN 3: GAME -->
  <div id="screen-game" class="hidden">
    <div class="gamehead">
      <div class="titlewrap">
        <h2 id="gameTitle">게임</h2>
        <div class="gameTitleEn" id="gameTitleEn"></div>
        <div class="progresswrap">
          <div class="progressbar"><div class="fill" id="progressFill"></div></div>
          <span id="progressText">1 / 17</span>
        </div>
      </div>
      <div class="score">⭐ <span id="scoreText">0</span></div>
    </div>

    <div class="stage">
      <div class="plateframe hidden" id="plateFrame"><img id="promptImg" src="" alt=""></div>
      <div class="prompttext" id="promptTextWrap">
        <span class="kotag hidden" id="promptTag"></span>
        <div class="main" id="promptMain"></div>
      </div>
      <div class="word-en hidden" id="wordEn"></div>
      <div class="sentence-en hidden" id="sentenceEn"></div>

      <div class="controls">
        <div class="transcript" id="transcript"></div>
        <div class="feedback" id="feedback"></div>

        <div class="microw" id="micRow">
          <button class="sidebtn" id="listenBtn" title="정답 듣기">🔊</button>
          <button class="micbtn" id="micBtn" title="눌러서 말하기">🎤</button>
          <button class="sidebtn" id="retryBtn" title="다시 듣기">↺</button>
        </div>
        <div class="miclabel" id="micLabel">마이크를 눌러 말해보세요</div>

        <div class="textfallback hidden" id="textFallback">
          <input type="text" id="textInput" placeholder="여기에 답을 입력하세요">
          <button id="textSubmit">확인</button>
        </div>
        <button class="toggletext" id="toggleText">텍스트로 입력할래요</button>

        <div class="actionrow">
          <button class="btn ghost" id="showAnswerBtn">정답 보기</button>
          <button class="btn next" id="nextBtn" disabled>다음 →</button>
        </div>
        <div class="notice hidden" id="micNotice">이 브라우저는 음성 인식을 지원하지 않아요. 텍스트로 입력해서 연습해보세요!</div>
      </div>
    </div>
  </div>

  <!-- SCREEN 4: RESULT -->
  <div id="screen-result" class="hidden">
    <div class="resultbox">
      <div class="emoji" id="resultEmoji">🎉</div>
      <h2 id="resultTitle">완료했어요!</h2>
      <div class="scoreline"><span id="resultScore">0</span> / <span id="resultTotal">17</span></div>
      <div class="scoresub">정답을 맞춘 개수예요</div>
      <div class="resultactions">
        <button class="btn primary" id="resultRetryBtn">🔁 이 게임 다시 하기</button>
        <button class="btn ghost" id="resultUnitBtn">📚 다른 게임 고르기</button>
        <button class="btn ghost" id="resultHomeBtn">🏠 다른 단원 고르기</button>
      </div>
    </div>
  </div>
</div>

<script>
/* =========================================================

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* =========================================================
   POOL BUILDERS
========================================================= */
function buildPoolForMode(unitId, modeId){
  const unit = currentUnitsData()[unitId];
  if(modeId===1){
    return shuffle(unit.words.map(w=>({
      type:'word', en:w.en, ko:w.ko, target:w.en, promptDisplay:'image',
      img:w.mediaKey, listenAudioKey:(AUDIOS[w.mediaKey]?w.mediaKey:null), listenText:w.en, listenLang:'en-US'
    })));
  }
  if(modeId===2){
    return shuffle(unit.words.map(w=>{
      if(w.game2Sentence){
        return {
          type:'sentence', en:w.en, ko:w.ko, sentenceEn:w.game2Sentence,
          target:w.game2Sentence, promptDisplay:'image+text', img:w.mediaKey,
          listenAudioKey:null, listenText:w.game2Sentence, listenLang:'en-US'
        };
      }
      return {
        type:'word', en:w.en, ko:w.ko, sentenceEn:null,
        target:w.en, promptDisplay:'image+text', img:w.mediaKey,
        listenAudioKey:(AUDIOS[w.mediaKey]?w.mediaKey:null), listenText:w.en, listenLang:'en-US'
      };
    }));
  }
  if(modeId===3){
    return shuffle(buildMixedPool(unit, 'text-en'));
  }
  if(modeId===4){
    return shuffle(buildMixedPool(unit, 'text-ko'));
  }
  if(modeId===5){
    return shuffle(buildMixedPool(unit, 'text-en', true));
  }
  return [];
}

function buildMixedPool(unit, promptDisplay, targetIsKo){
  const wordItems = unit.words.map(w=>({
    type:'word', en:w.en, ko:w.ko,
    target: targetIsKo ? w.ko : w.en,
    promptDisplay,
    listenAudioKey: (!targetIsKo && AUDIOS[w.mediaKey]) ? w.mediaKey : null,
    listenText: targetIsKo ? w.ko : w.en,
    listenLang: targetIsKo ? 'ko-KR' : 'en-US'
  }));
  const exprItems = unit.expressions.map(s=>({
    type:'sentence', en:s.en, ko:s.ko,
    target: targetIsKo ? s.ko : s.en,
    promptDisplay,
    listenAudioKey: null,
    listenText: targetIsKo ? s.ko : s.en,
    listenLang: targetIsKo ? 'ko-KR' : 'en-US'
  }));
  return [...wordItems, ...exprItems];
}

function answerLangForMode(modeId){
  return modeId===5 ? 'ko-KR' : 'en-US';
}

  const color = GRADE_COLORS[i % GRADE_COLORS.length];
  const unitCount = Object.keys(grade.units).length;

  const unitsData = currentUnitsData();

  unitListEl.innerHTML = '';
  ids.forEach((uid, i)=>{

    const color = UNIT_COLORS[i % UNIT_COLORS.length];
    const card = document.createElement('div');
    card.className = 'listcard';
    card.innerHTML = `
      <div class="num" style="background:${color}">${uid}</div>
      <div class="body">
        <h3>Lesson ${uid} <span class="titleEn">${unit.titleEn}</span></h3>
        <p>단어 ${unit.words.length}개 · 표현 ${unit.expressions.length}개</p>
      </div>
      <div class="tag" style="background:${color}">L${uid}</div>

    card.addEventListener('click', ()=>selectUnit(uid));
    unitListEl.appendChild(card);
  });
}

function startGame(unitId, modeId){
  state.currentUnit = unitId;
  state.modeId = modeId;
  state.pool = buildPoolForMode(unitId, modeId);
  state.idx = 0;
  state.score = 0;
  const meta = MODE_META.find(m=>m.id===modeId);
  const unit = currentUnitsData()[unitId];
  gameTitle.textContent = `L${unitId}. ${meta.title}`;
  gameTitleEn.textContent = `${unit.titleEn} — ${meta.titleEn}`;
  showScreen('game');
  renderQuestion();
  requestMicUpfront();
}

function currentItem(){ return state.pool[state.idx]; }

function renderQuestion(){
  stopAllAudio();
  state.answered = false;
  transcriptEl.textContent = '';
  feedbackEl.className = 'feedback';
  feedbackEl.textContent = '';
  nextBtn.disabled = true;
  textInput.value = '';
  textFallback.classList.add('hidden');
  toggleTextBtn.textContent = '텍스트로 입력할래요';
  state.usingText = false;

  const item = currentItem();
  scoreText.textContent = state.score;
  progressText.textContent = `${state.idx+1} / ${state.pool.length}`;
  progressFill.style.width = `${((state.idx)/state.pool.length)*100}%`;

  plateFrame.classList.add('hidden');
  promptTag.classList.add('hidden');
  promptMain.textContent = '';
  wordEn.classList.add('hidden');
  sentenceEn.classList.add('hidden');
  document.getElementById('promptTextWrap').classList.add('hidden');

  if(item.promptDisplay==='image'){
    plateFrame.classList.remove('hidden');
    promptImg.src = IMAGES[item.img];
    promptImg.alt = item.en;
  } else if(item.promptDisplay==='image+text'){
    plateFrame.classList.remove('hidden');
    promptImg.src = IMAGES[item.img];
    promptImg.alt = item.en;
    wordEn.textContent = item.en;
    wordEn.classList.remove('hidden');
    sentenceEn.textContent = item.sentenceEn ? item.sentenceEn : `💡 뜻: ${item.ko}`;
    sentenceEn.classList.remove('hidden');
  } else if(item.promptDisplay==='text-en'){
    document.getElementById('promptTextWrap').classList.remove('hidden');
    promptTag.classList.remove('hidden');
    promptTag.textContent = item.type==='word' ? 'WORD' : 'SENTENCE';
    promptMain.textContent = item.en;
  } else if(item.promptDisplay==='text-ko'){
    document.getElementById('promptTextWrap').classList.remove('hidden');
    promptTag.classList.remove('hidden');
    promptTag.textContent = item.type==='word' ? '단어' : '문장';
    promptMain.textContent = item.ko;
  }

  micLabel.textContent = recognitionSupported ? '마이크를 눌러 말해보세요' : '';
  micNotice.classList.toggle('hidden', recognitionSupported && !state.micBlocked);
  micRow.classList.toggle('hidden', !recognitionSupported);
  if(!recognitionSupported){
    textFallback.classList.remove('hidden');
    state.usingText = true;
  }
}

function goNext(){
  if(state.idx < state.pool.length-1){
    state.idx++;
    renderQuestion();
  } else {
    finishGame();
  }
}
nextBtn.addEventListener('click', goNext);

function finishGame(){
  stopRecognition();
  stopAllAudio();
  showScreen('result');
  const total = state.pool.length;
  document.getElementById('resultScore').textContent = state.score;
  document.getElementById('resultTotal').textContent = total;
  const ratio = state.score/total;
  let emoji='🎉', title='완료했어요!';
  if(ratio>=0.9){emoji='🏆'; title='완벽해요! 최고예요!';}
  else if(ratio>=0.7){emoji='🎉'; title='정말 잘했어요!';}
  else if(ratio>=0.4){emoji='💪'; title='조금만 더 연습해봐요!';}
  else {emoji='🌱'; title='다시 도전해봐요!';}
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  try{ if(window.parent && window.parent!==window){ var _u=(currentUnitsData()[state.currentUnit]||{}); var _m=(MODE_META.find(function(m){return m.id===state.modeId;})||{}); window.parent.postMessage({type:'engQuizDone', score:state.score, total:total, grade:state.currentGrade, unit:state.currentUnit, unitTitle:_u.titleEn||'', mode:state.modeId, modeTitle:_m.title||''}, '*'); } }catch(e){}
}

/* =========================================================
   ANSWER CHECKING
========================================================= */
function normalizeEn(s){
  return s.toLowerCase()
    .replace(/['’]/g,'')
    .replace(/[^a-z0-9\s]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}
function normalizeKo(s){
  return s
    .replace(/[.,!?~"']/g,'')
    .replace(/\s+/g,'')
    .trim();
}
function tokenOverlapRatio(a,b){
  const ta = a.split(' ').filter(Boolean);
  const tb = b.split(' ').filter(Boolean);
  if(tb.length===0) return 0;
  let hit=0;
  const pool = ta.slice();
  tb.forEach(tok=>{
    const i = pool.indexOf(tok);
    if(i>-1){ hit++; pool.splice(i,1); }
  });
  return hit/tb.length;
}
function bigramDice(a,b){
  function bigrams(s){
    const arr=[];
    for(let i=0;i<s.length-1;i++) arr.push(s.substr(i,2));
    return arr;
  }
  const ba=bigrams(a), bb=bigrams(b);
  if(ba.length===0 || bb.length===0) return a===b ? 1:0;
  let matches=0;
  const pool=bb.slice();
  ba.forEach(g=>{
    const i=pool.indexOf(g);
    if(i>-1){ matches++; pool.splice(i,1); }
  });
  return (2*matches)/(ba.length+bb.length);
}

/* Common English homophones / near-homophones that speech recognition
   frequently confuses, especially for short one-syllable words like
   "do", "to", "I", "so", "not", "for"... Each inner array is a group of
   words that should be treated as equivalent when the target is a short
   word. */
const HOMOPHONE_GROUPS = [
  ['do','due','dew','doo'], ['to','too','two'], ['i',"i'm",'eye','aye'],
  ['be','bee'], ['so','sew','sow'], ['no','know'], ['not','knot'],
  ['or','oar','ore'], ['for','four','fore'], ['see','sea','c'],
  ['right','write','wright'], ['red','read'], ['blue','blew'],
  ['here','hear'], ['where','wear','ware'], ['one','won'],
  ['sun','son'], ['ate','eight'], ['new','knew'], ['in','inn'],
  ['buy','by','bye'], ['sure','shore'], ['some','sum'], ['our','hour'],
  ['bear','bare'], ['flower','flour'], ['pair','pear','pare'],
  ['tail','tale'], ['way','weigh'], ['wait','weight'],
  ['plane','plain'], ['meat','meet'], ['night','knight'],
  ['their','there',"theyre"], ['break','brake'], ['week','weak'],
  ['made','maid'], ['sale','sail'], ['dear','deer'], ['bread','bred'],
  ['pain','pane'], ['rain','reign','rein'], ['road','rode'],
  ['soar','sore'], ['steak','stake'], ['through','threw'],
  ['toe','tow'], ['waist','waste'], ['fair','fare'],
  ['great','grate'], ['peace','piece'], ['sight','site'],
  ['stair','stare'], ['peak','peek'], ['would','wood'],
  ['ball','bawl'], ['aunt','ant'], ['hi','high'],
];
const HOMOPHONE_MAP = {};
HOMOPHONE_GROUPS.forEach(group=>{
  group.forEach(w=>{ HOMOPHONE_MAP[w] = group; });
});
function homophoneMatch(a, b){
  const group = HOMOPHONE_MAP[a];
  return !!group && group.includes(b);
}

function checkAnswer(transcript, item, lang){
  const target = item.target;
  if(lang==='ko-KR'){
    const nt = normalizeKo(transcript);
    const ng = normalizeKo(target);
    if(ng.length<=4){
      return nt.includes(ng) || ng.includes(nt);
    }
    return bigramDice(nt, ng) >= 0.45 || nt.includes(ng);
  } else {
    const nt = normalizeEn(transcript);
    const ng = normalizeEn(target);
    const wc = ng.split(' ').filter(Boolean).length;
    if(wc<=2){
      if(nt.includes(ng) || tokenOverlapRatio(nt,ng)>=0.9) return true;
      // For short words, also accept common homophones (do/due, to/too/two, ...)
      // and check word-by-word in case the utterance has extra filler words.
      const tokens = nt.split(' ').filter(Boolean);
      if(homophoneMatch(ng, nt)) return true;
      return tokens.some(tok=>homophoneMatch(ng, tok) || homophoneMatch(tok, ng));
    }
    return tokenOverlapRatio(nt, ng) >= 0.55;
  }
}

function markResult(isCorrect, transcript){
  state.answered = true;
  nextBtn.disabled = false;
  const item = currentItem();
  if(isCorrect){
    state.score++;
    scoreText.textContent = state.score;
    feedbackEl.className = 'feedback correct';
    feedbackEl.innerHTML = '🎉 정답이에요!';
    micLabel.textContent = '정답이에요! 다음으로 넘어가볼까요?';
    spawnFloatBadge('✨');
  } else {
    feedbackEl.className = 'feedback wrong';
    feedbackEl.innerHTML = `아직이에요! 정답 발음을 듣고 다시 따라 말해보세요.<span class="answer-reveal">정답: ${item.target}</span>`;
    setTimeout(()=>{
      playItemAudio(item, ()=>{ micLabel.textContent = '이제 마이크를 눌러 다시 따라 말해보세요'; });
    }, 350);
  }
}

showAnswerBtn.addEventListener('click', ()=>{
  const item = currentItem();
  feedbackEl.className = 'feedback wrong';
  feedbackEl.innerHTML = `정답: <b>${item.target}</b>`;
  nextBtn.disabled = false;
  state.answered = true;
});

/* =========================================================
   SPEECH RECOGNITION
========================================================= */
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognitionSupported = !!SpeechRecognitionAPI;
let recognizer = null;
let micPermissionGranted = false;

if(recognitionSupported){
  recognizer = new SpeechRecognitionAPI();
  recognizer.continuous = false;
  recognizer.interimResults = true;
  recognizer.maxAlternatives = 5;

  recognizer.onstart = ()=>{
    state.recognizing = true;
    micBtn.classList.add('listening');
    micLabel.textContent = '👂 듣고 있어요... 지금 말해보세요!';
  };
  recognizer.onend = ()=>{
    state.recognizing = false;
    micBtn.classList.remove('listening');
    if(!state.answered) micLabel.textContent = '마이크를 눌러 말해보세요';
  };
  recognizer.onerror = (e)=>{
    state.recognizing = false;
    micBtn.classList.remove('listening');
    let msg = '다시 눌러서 말해보세요';
    if(e.error==='not-allowed' || e.error==='service-not-allowed'){
      msg = '🚫 마이크 권한이 꺼져 있어요.';
      showMicBlockedHelp();
    } else if(e.error==='no-speech'){
      msg = '소리가 들리지 않았어요. 마이크를 누르고 화면에 "듣고 있어요"가 뜨면 또렷하게 말해보세요.';
    } else if(e.error==='audio-capture'){
      msg = '🎤 마이크를 찾을 수 없어요. 마이크 연결/권한을 확인해주세요.';
    } else if(e.error==='network'){
      msg = '📶 인터넷 연결을 확인해주세요. 음성 인식에는 인터넷 연결이 필요해요.';
    } else if(e.error==='aborted'){
      msg = '마이크를 눌러 말해보세요';
    } else {
      msg = `다시 눌러서 말해보세요 (오류: ${e.error})`;
    }
    micLabel.textContent = msg;
  };
  recognizer.onresult = (e)=>{
    const res = e.results[e.results.length-1];
    if(!res.isFinal){
      transcriptEl.textContent = `🎙️ 듣는 중: "${res[0].transcript}"`;
      return;
    }
    let best = res[0].transcript;
    const item = currentItem();
    const lang = answerLangForMode(state.modeId);
    let correct = false;
    for(let i=0;i<res.length;i++){
      if(checkAnswer(res[i].transcript, item, lang)){ correct=true; best=res[i].transcript; break; }
    }
    transcriptEl.textContent = `👂 인식된 말: "${best}"`;
    markResult(correct, best);
  };
}

function stopRecognition(){
  if(recognitionSupported && state.recognizing){
    try{ recognizer.stop(); }catch(e){}
  }
}

async function ensureMicPermission(){
  if(micPermissionGranted) return true;
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    return true;
  }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    stream.getTracks().forEach(t=>t.stop());
    micPermissionGranted = true;
    state.micBlocked = false;
    micNotice.classList.add('hidden');
    return true;
  }catch(err){
    return false;
  }
}

async function requestMicUpfront(){
  if(!recognitionSupported) return;
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
  let state_ = 'prompt';
  try{
    if(navigator.permissions && navigator.permissions.query){
      const status = await navigator.permissions.query({name:'microphone'});
      state_ = status.state;
    }
  }catch(err){ /* unsupported — fall through */ }

  if(state_==='denied'){
    showMicBlockedHelp();
    return;
  }
  const granted = await ensureMicPermission();
  if(!granted){
    showMicBlockedHelp();
  }
}

function showMicBlockedHelp(){
  state.micBlocked = true;
  micNotice.classList.remove('hidden');
  micNotice.innerHTML =
    '🚫 마이크 권한이 차단되어 있어요.<br>' +
    '주소창의 <b>🔒 자물쇠 아이콘</b>(또는 사이트 정보) → <b>마이크 → 허용</b>으로 바꾼 뒤, 아래 버튼을 눌러주세요.<br>' +
    '<button id="micRecheckBtn" class="btn primary" style="margin-top:8px;padding:8px 14px;font-size:12.5px;">🔄 권한 다시 확인하기</button>';
  const btn = document.getElementById('micRecheckBtn');
  if(btn){
    btn.addEventListener('click', async ()=>{
      micPermissionGranted = false;
      const granted = await ensureMicPermission();
      if(granted){
        state.micBlocked = false;
        micNotice.classList.add('hidden');
        micLabel.textContent = '마이크를 눌러 말해보세요';
      } else {
        showMicBlockedHelp();
      }
    });
  }
}

async function startListening(){
  if(!recognitionSupported) return;
  if(state.recognizing){ recognizer.stop(); return; }
  stopAllAudio();
  transcriptEl.textContent = '';
  feedbackEl.className='feedback';
  feedbackEl.textContent='';
  micLabel.textContent = '마이크 준비 중...';
  const granted = await ensureMicPermission();
  if(!granted){
    micLabel.textContent = '🚫 마이크 권한이 필요해요. 브라우저 주소창 옆 자물쇠(또는 사이트 설정)에서 마이크를 허용해주세요.';
    textFallback.classList.remove('hidden');
    return;
  }
  const lang = answerLangForMode(state.modeId);
  recognizer.lang = lang;
  try{
    recognizer.start();
  }catch(e){
    micLabel.textContent = '마이크를 시작하지 못했어요. 다시 눌러주세요.';
  }
}
micBtn.addEventListener('click', startListening);
retryBtn.addEventListener('click', startListening);

/* Text fallback */
toggleTextBtn.addEventListener('click', ()=>{
  const showing = !textFallback.classList.contains('hidden');
  textFallback.classList.toggle('hidden', showing);
  toggleTextBtn.textContent = showing ? '텍스트로 입력할래요' : '마이크로 말할래요';
});
function submitText(){
  const val = textInput.value.trim();
  if(!val) return;
  const item = currentItem();
  const lang = answerLangForMode(state.modeId);
  const correct = checkAnswer(val, item, lang);
  transcriptEl.textContent = `✍️ 입력한 답: "${val}"`;
  markResult(correct, val);
}
textSubmit.addEventListener('click', submitText);
textInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') submitText(); });

/* =========================================================
   AUDIO PLAYBACK (real recordings + TTS fallback)
========================================================= */
let cachedVoices = [];
function refreshVoices(){
  if('speechSynthesis' in window){
    cachedVoices = window.speechSynthesis.getVoices() || [];
  }
}
if('speechSynthesis' in window){
  refreshVoices();
  window.speechSynthesis.onvoiceschanged = refreshVoices;
}
function pickVoice(lang){
  if(!cachedVoices.length) refreshVoices();
  if(!cachedVoices.length) return null;
  const exact = cachedVoices.find(v=>v.lang===lang);
  if(exact) return exact;
  const short = lang.split('-')[0];
  const loose = cachedVoices.find(v=>v.lang && v.lang.toLowerCase().startsWith(short));
  return loose || null;
}

let currentAudioEl = null;
function stopAllAudio(){
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
  if(currentAudioEl){
    try{ currentAudioEl.pause(); }catch(e){}
    currentAudioEl = null;
  }
}

function speak(text, lang, onDone){
  if(!('speechSynthesis' in window)){
    micLabel.textContent = '🔇 이 기기/브라우저는 소리로 듣기를 지원하지 않아요.';
    if(onDone) onDone();
    return;
  }
  window.speechSynthesis.cancel();
  micLabel.textContent = '🔊 발음을 들려줄게요...';
  setTimeout(()=>{
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 0.9;
    u.pitch = 1;
    u.volume = 1;
    const voice = pickVoice(lang);
    if(voice) u.voice = voice;
    let spoke = false;
    u.onstart = ()=>{ spoke = true; };
    u.onend = ()=>{ if(onDone) onDone(); };
    u.onerror = ()=>{
      micLabel.textContent = '🔇 소리 재생에 실패했어요. 기기 볼륨/TTS 설정을 확인해주세요.';
      if(onDone) onDone();
    };
    window.speechSynthesis.speak(u);
    setTimeout(()=>{
      if(!spoke && !window.speechSynthesis.speaking){
        micLabel.textContent = '🔇 소리가 재생되지 않았어요. 기기의 텍스트 음성 변환(TTS) 설정을 확인해주세요.';
      }
    }, 900);
  }, 80);
}

// Prefers real recorded pronunciation (mp3) for single words; falls back to TTS
// for generated sentences/expressions that have no recording.
function playItemAudio(item, onDone){
  stopAllAudio();
  if(item.listenAudioKey && AUDIOS[item.listenAudioKey]){
    micLabel.textContent = '🔊 발음을 들려줄게요...';
    const audioEl = new Audio(AUDIOS[item.listenAudioKey]);
    currentAudioEl = audioEl;
    audioEl.onended = ()=>{ if(onDone) onDone(); };
    audioEl.onerror = ()=>{ speak(item.listenText, item.listenLang, onDone); };
    audioEl.play().catch(()=>{ speak(item.listenText, item.listenLang, onDone); });
  } else {
    speak(item.listenText, item.listenLang, onDone);
  }
}
listenBtn.addEventListener('click', ()=>{
  const item = currentItem();
  playItemAudio(item, ()=>{
    if(!state.answered) micLabel.textContent = '마이크를 눌러 말해보세요';
  });
});

/* =========================================================
   FLOAT BADGE FX
========================================================= */
function spawnFloatBadge(emoji){
  const el = document.createElement('div');
  el.className='float-badge';
  el.textContent = emoji;
  const rect = micBtn.getBoundingClientRect();
  el.style.left = (rect.left + rect.width/2 - 13) + 'px';
  el.style.top = (rect.top) + 'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1000);
}

(function showEnvironmentWarnings(){
  const box = document.getElementById('fileProtocolWarning');
  const isFileProtocol = location.protocol === 'file:';
  const isInsecure = !isFileProtocol && location.protocol !== 'https:' && location.hostname!=='localhost';

  if(isFileProtocol){
    box.classList.remove('hidden');
    box.innerHTML =
      '📱 <b>파일을 직접 열면 마이크가 작동하지 않을 수 있어요.</b><br>' +
      '이 파일을 웹에 올려서 <b>https 주소</b>로 열어주세요 (Netlify Drop, GitHub Pages 등). ' +
      '그전까지는 각 게임의 "텍스트로 입력할래요" 기능으로 연습할 수 있어요.';
  } else if(!recognitionSupported){
    box.classList.remove('hidden');
    box.innerHTML =
      '🎤 <b>이 브라우저는 음성 인식을 지원하지 않아요.</b><br>' +
      '안드로이드는 <b>Chrome</b>, 아이폰은 <b>Safari(iOS 14.5 이상)</b>을 사용해보세요.';
  } else if(isInsecure){
    box.classList.remove('hidden');
    box.innerHTML = '🔒 <b>보안 연결(https)이 아니면 마이크가 작동하지 않을 수 있어요.</b>';
  }
})();
